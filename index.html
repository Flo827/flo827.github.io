<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurateur de prix · Florian Matet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Atkinson+Hyperlegible:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Privacy-friendly analytics by Plausible -->
<script async src="https://plausible.io/js/pa-Th5RHMLMMjfZdogE5d8sP.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>
<style>
:root{
  --paper:#F2F5F4;
  --surface:#FFFFFF;
  --ink:#1C2B2D;
  --ink-soft:#51625F;
  --line:#DCE5E2;
  --accent:#14655A;
  --accent-deep:#0E4A42;
  --accent-tint:#E4F0ED;
  --tier-light:#5E7A63;     --tier-light-bg:#E7EFE8;
  --tier-std:#20626B;       --tier-std-bg:#DFEDEF;
  --tier-heavy:#9A5B2F;     --tier-heavy-bg:#F4E7DB;
  --warn:#9A5B2F;           --warn-bg:#F4E7DB;
  --radius:10px;
  --font-display:"Bricolage Grotesque",system-ui,sans-serif;
  --font-body:"Atkinson Hyperlegible",system-ui,sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

/* ---------- header ---------- */
.masthead{border-bottom:1px solid var(--line);background:var(--surface)}
.masthead-inner{max-width:1180px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:14px;justify-content:space-between;flex-wrap:wrap}
.wordmark{font-family:var(--font-mono);font-weight:600;font-size:.85rem;letter-spacing:.06em;color:var(--accent-deep)}
.wordmark span{color:var(--ink-soft);font-weight:400}
.lang-toggle{display:inline-flex;border:1.5px solid var(--line);border-radius:8px;overflow:hidden}
.lang-toggle button{border:none;background:var(--surface);padding:6px 12px;font-family:var(--font-mono);font-size:.78rem;font-weight:600;color:var(--ink-soft)}
.lang-toggle button[aria-pressed="true"]{background:var(--ink);color:#F2F5F4}

.hero{max-width:1180px;margin:0 auto;padding:38px 24px 10px}
.hero h1{font-family:var(--font-display);font-weight:700;font-size:clamp(1.9rem,4vw,2.9rem);line-height:1.08;letter-spacing:-.01em;max-width:680px}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{margin-top:12px;color:var(--ink-soft);max-width:600px}

/* ---------- values band ---------- */
.values{max-width:1180px;margin:0 auto;padding:18px 24px 30px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.value{border-top:2px solid var(--accent);padding-top:10px}
.value h3{font-family:var(--font-mono);font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-deep);margin-bottom:4px}
.value p{font-size:.86rem;color:var(--ink-soft);line-height:1.45}
/* Multi-line copy: a \n inside any STR string renders as a line break in these spots */
.hero p,.value p,.block-sub,.segment .seg-desc,.app .blurb,.extra-row .body .muted,.legend-line .desc,.bulk-note{white-space:pre-line}
@media (max-width:760px){.values{grid-template-columns:1fr}}

/* ---------- layout ---------- */
.shell{max-width:1180px;margin:0 auto;padding:0 24px 120px;display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:32px;align-items:start}
.config{display:flex;flex-direction:column;gap:30px;min-width:0}

/* ---------- section card ---------- */
.block{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px}
.block-head{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;align-items:flex-start}
.block-head.row{flex-direction:row;align-items:baseline;justify-content:space-between;width:100%;flex-wrap:wrap;gap:10px}
.eyebrow{font-family:var(--font-mono);font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.block h2{font-family:var(--font-display);font-weight:600;font-size:1.32rem}
.block-sub{color:var(--ink-soft);font-size:.92rem;margin-bottom:18px;max-width:640px}
.mini-btns{display:flex;gap:8px;flex-wrap:wrap}
.mini-btn{border:1.5px solid var(--line);background:var(--surface);border-radius:7px;padding:6px 11px;font-size:.8rem;font-weight:700;color:var(--accent-deep)}
.mini-btn:hover{background:var(--accent-tint);border-color:var(--accent)}

/* ---------- audit strip ---------- */
.audit-strip{border-left:4px solid var(--accent)}
.audit-strip .block-sub{margin-bottom:0}
.audit-strip .price-tag{font-family:var(--font-mono);font-size:.88rem;font-weight:600;color:var(--accent-deep);white-space:nowrap}
.audit-head{display:flex;justify-content:space-between;align-items:baseline;gap:14px;flex-wrap:wrap;width:100%}

/* ---------- segmented control ---------- */
.segment{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.segment button{border:1.5px solid var(--line);background:var(--surface);border-radius:var(--radius);padding:14px;text-align:left;transition:border-color .15s,background .15s;display:flex;flex-direction:column;gap:4px}
.segment button .seg-title{font-weight:700}
.segment button .seg-tag{font-family:var(--font-mono);font-size:.7rem;font-weight:600;letter-spacing:.04em;color:var(--accent-deep);background:var(--accent-tint);border-radius:5px;padding:2px 7px;align-self:flex-start}
.segment button .seg-desc{font-size:.83rem;color:var(--ink-soft)}
.segment button[aria-pressed="true"]{border-color:var(--accent);background:var(--accent-tint)}
.segment button[aria-pressed="true"] .seg-title{color:var(--accent-deep)}
.segment button[aria-pressed="true"] .seg-tag{background:#fff}
@media (max-width:760px){.segment{grid-template-columns:1fr}}

/* ---------- steppers & slider ---------- */
.stepper{display:inline-flex;align-items:center;border:1.5px solid var(--line);border-radius:8px;overflow:hidden;flex:none}
.stepper button{width:36px;height:36px;border:none;background:var(--surface);font-size:1.1rem;font-weight:700;color:var(--accent-deep)}
.stepper button:hover{background:var(--accent-tint)}
.stepper output{min-width:64px;text-align:center;font-family:var(--font-mono);font-weight:600;font-size:.92rem;border-left:1.5px solid var(--line);border-right:1.5px solid var(--line);height:36px;line-height:36px}
.slider-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-row output{font-family:var(--font-mono);font-weight:600;font-size:.95rem;min-width:64px;text-align:right}
.bulk-note{font-size:.8rem;color:var(--ink-soft);margin:-6px 0 12px}

/* ---------- tier legend ---------- */
.legend{display:flex;flex-direction:column;gap:9px;margin-bottom:22px;border:1px dashed var(--line);border-radius:8px;padding:12px}
.legend-line{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.legend-line .desc{font-size:.84rem;color:var(--ink-soft)}
.chip{font-family:var(--font-mono);font-size:.72rem;font-weight:600;letter-spacing:.03em;padding:5px 10px;border-radius:999px;white-space:nowrap}
.chip.t-light{background:var(--tier-light-bg);color:var(--tier-light)}
.chip.t-standard{background:var(--tier-std-bg);color:var(--tier-std)}
.chip.t-heavy{background:var(--tier-heavy-bg);color:var(--tier-heavy)}

/* ---------- app catalogue ---------- */
.cat{margin-bottom:18px}
.cat:last-child{margin-bottom:0}
.cat-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid #C4DDD6;border-left:4px solid var(--accent);background:var(--accent-tint);border-radius:8px;padding:11px 13px;font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--accent-deep);transition:background .15s}
.cat-head:hover{background:#D8EAE5}
.cat-head .ch-right{display:flex;align-items:center;gap:9px}
.cat-count{font-family:var(--font-mono);font-size:.72rem;font-weight:600;background:#fff;color:var(--accent-deep);border-radius:999px;padding:3px 9px}
.chev{display:inline-block;transition:transform .15s;font-size:.85rem;color:var(--accent-deep)}
.cat-head[aria-expanded="false"] .chev{transform:rotate(-90deg)}
.cat-body{padding-top:12px}
.apps{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:12px}
.altgroup{grid-column:1/-1;margin-top:14px;border:1.5px solid #9FC4BB;background:#F4FAF8;border-radius:var(--radius);padding:22px 12px 12px;position:relative;display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:12px}
.altgroup-label{position:absolute;top:-11px;left:12px;background:var(--accent);color:#fff;padding:3px 10px;border-radius:999px;font-family:var(--font-mono);font-size:.66rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.app{position:relative;border:1.5px solid var(--line);border-radius:var(--radius);padding:12px 12px 10px;background:var(--surface);text-align:left;transition:border-color .15s,background .15s;display:flex;flex-direction:column;gap:6px;cursor:pointer}
.app:hover{border-color:#B9CCC6}
.app[aria-pressed="true"]{border-color:var(--accent);background:var(--accent-tint)}
.app .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.app .name{font-weight:700;font-size:.95rem}
.app .blurb{font-size:.82rem;color:var(--ink-soft);line-height:1.35;flex:1}
.app .price{font-family:var(--font-mono);font-size:.78rem;color:var(--ink);margin-top:2px}
.app .dep-note{font-size:.74rem;color:var(--accent-deep);background:var(--accent-tint);border-radius:5px;padding:2px 7px;align-self:flex-start}
.app[aria-pressed="true"] .dep-note{background:#fff}
.app .check{width:18px;height:18px;flex:none;border:1.5px solid var(--line);border-radius:5px;display:grid;place-items:center;color:#fff;font-size:.7rem;font-weight:700;transition:background .15s,border-color .15s}
.app[aria-pressed="true"] .check{background:var(--accent);border-color:var(--accent)}
.app .train{display:none;margin-top:2px;font-size:.78rem;gap:7px;align-items:flex-start;background:#fff;border:1px dashed #AFC6BF;border-radius:6px;padding:6px 8px;cursor:pointer}
.app[aria-pressed="true"] .train{display:flex}
.app .train input{margin-top:3px;accent-color:var(--accent)}
.app .train .tsub{display:block;font-size:.72rem;color:var(--ink-soft)}

/* ---------- bulk storage ---------- */
.bulk-modes{margin-bottom:14px}
.roi-chart{border:1px solid var(--line);border-radius:8px;padding:10px;background:#FBFDFC}
.roi-chart svg{display:block;width:100%;height:auto}
.roi-legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:8px;font-family:var(--font-mono);font-size:.74rem;color:var(--ink-soft)}
.roi-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:baseline}
.roi-break{font-family:var(--font-mono);font-size:.74rem;color:var(--ink-soft);margin-top:4px}
.roi-note{margin-top:10px;font-size:.86rem;border-radius:8px;padding:10px 12px;display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.roi-note.warn{background:var(--warn-bg);border:1px solid #E2C7A8;color:#5C3A1E}
.roi-note.calm{background:var(--accent-tint);border:1px solid #C4DDD6;color:var(--accent-deep)}
.roi-note button{background:var(--warn);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:.84rem;font-weight:700}

/* ---------- extras ---------- */
.extra-row{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px dashed var(--line);justify-content:space-between;flex-wrap:wrap}
.extra-row:first-of-type{padding-top:4px}
.extra-row:last-child{border-bottom:none;padding-bottom:4px}
.extra-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--accent);flex:none}
.extra-row .body{flex:1;min-width:220px}
.extra-row .body strong{font-weight:700}
.extra-row .body .muted{display:block;font-size:.85rem;color:var(--ink-soft)}
select{font-family:var(--font-body);font-size:.92rem;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink)}

/* ---------- ledger ---------- */
.ledger{position:sticky;top:20px;background:var(--surface);border:1.5px solid var(--ink);border-radius:var(--radius);padding:22px;box-shadow:6px 6px 0 rgba(28,43,45,.08)}
.ledger-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.ledger-head h2{font-family:var(--font-display);font-weight:700;font-size:1.3rem}
.stamp{font-family:var(--font-mono);font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);border:1.5px dashed var(--accent);border-radius:6px;padding:5px 8px;transform:rotate(-5deg);text-align:center;line-height:1.3}
.lgroup{margin-bottom:24px}
.lgroup h4{font-family:var(--font-display);font-size:.92rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--accent-deep);background:var(--accent-tint);border-left:4px solid var(--accent);border-radius:0 7px 7px 0;padding:8px 11px;margin-bottom:10px}
.lrow{display:flex;justify-content:space-between;gap:12px;font-size:.85rem;padding:3px 0}
.lrow.indent{padding-left:16px}
.lrow.indent .li-name{color:var(--ink-soft)}
.lrow.credit .li-amt{color:var(--accent-deep)}
.lrow .li-name .sub{display:block;font-size:.73rem;color:var(--ink-soft)}
.lrow .li-amt{font-family:var(--font-mono);font-size:.8rem;white-space:nowrap}
.lrow.empty{color:var(--ink-soft);font-style:italic;font-size:.84rem}
.ltotal{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--line);margin-top:6px;padding-top:7px}
.ltotal .t-label{font-weight:700;font-size:.85rem}
.ltotal .t-amt{font-family:var(--font-mono);font-weight:600;font-size:.98rem}
.ltotal .t-amt.tick{animation:tick .35s ease}
@keyframes tick{0%{background:var(--accent-tint)}100%{background:transparent}}
.pool{margin:-14px 0 24px;font-size:.78rem;color:var(--accent-deep)}
.grand{margin-top:4px;background:var(--ink);color:#F2F5F4;border-radius:8px;padding:13px 14px;display:flex;flex-direction:column;gap:7px}
.grand .g-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.grand .g-label{font-size:1rem;font-weight:700;color:#F2F5F4}
.grand .g-amt{font-family:var(--font-mono);font-weight:600;font-size:1.4rem;white-space:nowrap}
.grand .g-note{font-size:.72rem;color:#9FB0AC;margin-top:-5px}
.grand .g-next-label{font-size:.82rem;color:#C8D4D1}
.grand .g-next{font-family:var(--font-mono);font-weight:500;font-size:.98rem;color:#E6EDEB;white-space:nowrap}
.rates{margin-top:14px;border:1.5px dashed var(--line);border-radius:8px;padding:10px 12px}
.rates .r-title{font-family:var(--font-mono);font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
.rates .r-ctx{font-size:.76rem;color:var(--ink-soft);margin:4px 0 6px}
.fine{margin-top:14px;font-size:.74rem;color:var(--ink-soft);line-height:1.45;border-top:1px dashed var(--line);padding-top:10px}
.actions{display:grid;grid-template-columns:1fr;gap:8px;margin-top:14px}
.actions button{border-radius:8px;padding:10px;font-weight:700;font-size:.88rem;border:1.5px solid var(--ink)}
.btn-ghost{background:var(--surface);color:var(--ink)}
.btn-ghost:hover{background:var(--paper)}
.btn-solid{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-solid:hover{background:var(--accent-deep);border-color:var(--accent-deep)}

/* ---------- mobile bar ---------- */
.mobilebar{display:none}

/* ---------- toast ---------- */
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:60;width:min(460px,calc(100vw - 32px))}
.toast{background:var(--ink);color:#F2F5F4;border-radius:8px;padding:10px 14px;font-size:.86rem;box-shadow:0 6px 18px rgba(0,0,0,.25);animation:rise .25s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- responsive ---------- */
@media (max-width:979px){
  .shell{grid-template-columns:1fr}
  .ledger{position:static}
  .mobilebar{display:flex;position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#F2F5F4;padding:10px 16px;align-items:center;justify-content:space-between;gap:12px;z-index:50}
  .mobilebar .mb-fig{font-family:var(--font-mono);font-size:.8rem;line-height:1.4}
  .mobilebar button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-weight:700;font-size:.84rem}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  html{scroll-behavior:auto}
}

/* ---------- print ---------- */
@media print{
  body{background:#fff}
  .masthead,.hero,.values,.config,.actions,.mobilebar,.toasts{display:none!important}
  .shell{display:block;padding:0;max-width:none}
  .ledger{position:static;border:1px solid #000;box-shadow:none}
  .grand{background:#fff;color:#000;border:2px solid #000}
  .grand .g-label,.grand .g-amt,.grand .g-next{color:#000}
  .grand .g-note,.grand .g-next-label{color:#444}
}
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <div class="wordmark">Florian Matet <span id="wm-tag"></span></div>
    <div class="lang-toggle" role="group" aria-label="Langue / Language">
      <button id="lang-fr" aria-pressed="true">FR</button>
      <button id="lang-en" aria-pressed="false">EN</button>
    </div>
  </div>
</header>

<section class="hero">
  <h1 id="hero-title"></h1>
  <p id="hero-sub"></p>
</section>

<section class="values">
  <div class="value"><h3 id="v1t"></h3><p id="v1d"></p></div>
  <div class="value"><h3 id="v2t"></h3><p id="v2d"></p></div>
  <div class="value"><h3 id="v3t"></h3><p id="v3d"></p></div>
</section>

<main class="shell">
  <div class="config">

    <!-- AUDIT (mandatory) -->
    <section class="block audit-strip">
      <div class="audit-head">
        <div class="block-head" style="margin-bottom:0"><span class="eyebrow" id="audit-eyebrow"></span><h2 id="audit-title"></h2></div>
        <span class="price-tag" id="audit-price"></span>
      </div>
      <p class="block-sub" id="audit-sub" style="margin-top:8px"></p>
    </section>

    <!-- DEPLOYMENT -->
    <section class="block">
      <div class="block-head"><span class="eyebrow" id="dep-eyebrow"></span><h2 id="dep-title"></h2></div>
      <p class="block-sub" id="dep-sub"></p>
      <div class="segment" role="group" id="dep-segment">
        <button id="seg-hosted" aria-pressed="true">
          <span class="seg-title" id="seg1-title"></span>
          <span class="seg-tag" id="seg1-tag"></span>
          <span class="seg-desc" id="seg1-desc"></span>
        </button>
        <button id="seg-owned" aria-pressed="false">
          <span class="seg-title" id="seg2-title"></span>
          <span class="seg-tag" id="seg2-tag"></span>
          <span class="seg-desc" id="seg2-desc"></span>
        </button>
      </div>
    </section>

    <!-- BULK STORAGE -->
    <section class="block">
      <div class="block-head"><span class="eyebrow" id="bulk-eyebrow"></span><h2 id="bulk-title"></h2></div>
      <p class="block-sub" id="bulk-sub"></p>
      <div class="slider-row">
        <input type="range" id="bulk-slider" min="0" max="20" step="1" value="0" aria-label="To / TB">
        <output id="bulk-out">0</output>
      </div>
      <p class="bulk-note" id="bulk-note"></p>
      <div id="bulk-body" hidden>
        <div class="segment bulk-modes" role="group">
          <button id="bulk-cloud" aria-pressed="true">
            <span class="seg-title" id="bc-title"></span>
            <span class="seg-desc" id="bc-desc"></span>
          </button>
          <button id="bulk-nas" aria-pressed="false">
            <span class="seg-title" id="bn-title"></span>
            <span class="seg-desc" id="bn-desc"></span>
          </button>
        </div>
        <div class="roi-chart">
          <div id="roi-svg"></div>
          <div class="roi-legend" id="roi-legend"></div>
          <div class="roi-break" id="roi-break"></div>
        </div>
        <div class="roi-note" id="roi-note" hidden>
          <span id="roi-text"></span>
          <button id="roi-btn" hidden></button>
        </div>
      </div>
    </section>


    <!-- APPS -->
    <section class="block">
      <div class="block-head row">
        <div class="block-head" style="margin-bottom:0"><span class="eyebrow" id="apps-eyebrow"></span><h2 id="apps-title"></h2></div>

const appById = id => APPS.find(a=>a.id===id);
const dependentsOf = id => APPS.filter(a=>
  (a.deps||[]).includes(id) ||
  ((a.needsOneOf||[]).includes(id) && !a.needsOneOf.some(o=>o!==id && isSelected(o)))
).map(a=>a.id);
const isOnPrem = () => state.deploy==="owned";
const isSelected = id => state.explicit.has(id) || state.implied.has(id);
const selectedCount = () => state.explicit.size + state.implied.size;
const tierMonthly = tier => isOnPrem() ? P.tiers[tier].monthlyOnPrem : P.tiers[tier].monthlyHosted;
const appMonthly = a => (a.alwaysHosted || !isOnPrem()) ? P.tiers[a.tier].monthlyHosted : P.tiers[a.tier].monthlyOnPrem;
const tbUnit = () => state.lang==="fr" ? "To" : "TB";
let fmt;
function setFmt(){ fmt = new Intl.NumberFormat(state.lang==="fr"?"fr-CA":"en-CA",{style:"currency",currency:"CAD",maximumFractionDigits:0}); }

function suiteWeight(){
  let w=0;
  [...state.explicit,...state.implied.keys()].forEach(id=>{
    const a=appById(id);
    if(!a.alwaysHosted) w+=P.hosted.weights[a.tier];   // isolated-VPS apps don't load the shared base
  });
  return w;
}
function hostedSize(){
  const w=suiteWeight();
  for(let i=0;i<P.hosted.sizes.length;i++) if(w<=P.hosted.sizes[i].maxWeight) return i;
  return P.hosted.sizes.length-1;
}
function nasOneTime(){
  return P.bulk.nas.setup + P.bulk.nas.hwBase + P.bulk.nas.hwPerTB*state.bulkTB;
}
function cloudMonthly(){ return P.bulk.cloud.perTBMonthly*state.bulkTB; }
function breakevenMonths(){
  const net=cloudMonthly()-P.bulk.nas.careMonthly;
  if(net<=0) return Infinity;
  return Math.ceil(nasOneTime()/net);
}

function toast(msg){
  const el=document.createElement("div"); el.className="toast"; el.textContent=msg;
  $("toasts").appendChild(el);
  setTimeout(()=>{ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(()=>el.remove(),320); },2600);
}

/* ====================== SELECTION LOGIC ====================== */
function applySideEffects(app){
  if(app.alt){
    APPS.filter(s=>s.alt===app.alt && s.id!==app.id && isSelected(s.id)).forEach(s=>{
      toast(tmpl(t("toastSwap"),{x:app.name,y:s.name}));
      removeApp(s.id,false);
    });
  }
}

function implyApp(depId, byApp){
  if(!isSelected(depId)){
    const dep=appById(depId);
    applySideEffects(dep);
    state.implied.set(depId,new Set([byApp.id]));
    toast(tmpl(t("toastAdded"),{x:dep.name,y:byApp.name}));
  }else if(state.implied.has(depId)){
    state.implied.get(depId).add(byApp.id);
  }
}

function selectApp(id){
  const app=appById(id);
  state.explicit.add(id);          // register first, so host swaps see the new selection
  state.implied.delete(id);
  applySideEffects(app);
  (app.deps||[]).forEach(d=>implyApp(d,app));
  if(app.needsOneOf){
    const satisfied=app.needsOneOf.find(isSelected);
    if(!satisfied) implyApp(app.needsOneOf[0],app);
    else if(state.implied.has(satisfied)) state.implied.get(satisfied).add(id);
  }
}

function removeApp(id,silent){
  const app=appById(id);
  state.explicit.delete(id);
  state.implied.delete(id);
  state.training.delete(id);
  dependentsOf(id).forEach(dep=>{
    if(isSelected(dep)){
      if(!silent) toast(tmpl(t("toastRemovedDep"),{x:appById(dep).name,y:app.name}));
      removeApp(dep,true);
    }
  });
  [...state.implied.entries()].forEach(([iid,reasons])=>{
    reasons.delete(id);
    if(reasons.size===0 && !state.explicit.has(iid)){
      state.implied.delete(iid);
      state.training.delete(iid);
      toast(tmpl(t("toastNoLongerNeeded"),{x:appById(iid).name}));
    }
  });
}

function toggleApp(id){
  if(isSelected(id)) removeApp(id,false); else selectApp(id);
  render();
}

    '<span class="check" aria-hidden="true">✓</span></span></span>'+
    '<span class="blurb">'+a.blurb[state.lang]+'</span>';
  if(a.deps) inner+='<span class="dep-note">'+t("needs")+' '+a.deps.map(d=>appById(d).name).join(", ")+'</span>';
  if(a.note) inner+='<span class="dep-note">'+a.note[state.lang]+'</span>';
  inner+='<span class="price">'+fmt.format(P.tiers[a.tier].setup)+' '+t("setupWord")+' · '+fmt.format(appMonthly(a))+t("perMo")+'</span>';
  if(a.train){
    inner+='<label class="train"><input type="checkbox" data-train="'+a.id+'"'+(state.training.has(a.id)?" checked":"")+'>'+
      '<span>'+t("trainLabel")+' '+fmt.format(a.train.price)+
      '<span class="tsub">'+a.train[state.lang]+'</span></span></label>';
  }
  card.innerHTML=inner;
  card.addEventListener("click",e=>{
    if(e.target.closest(".train")) return;
    toggleApp(a.id);
  });
  card.addEventListener("keydown",e=>{
    if(e.target.closest(".train")) return;
    if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggleApp(a.id); }
  });
  const tr=card.querySelector(".train input");
  if(tr){
    tr.addEventListener("click",e=>e.stopPropagation());
    tr.addEventListener("change",e=>{
      if(e.target.checked) state.training.add(a.id); else state.training.delete(a.id);
      render();
    });
  }
  return card;
}

function buildCatalogue(){
  const legend=$("legend"); legend.innerHTML="";
  ["light","standard","heavy"].forEach(k=>{
    const line=document.createElement("div"); line.className="legend-line";
    const chip=document.createElement("span");
    chip.className="chip t-"+k;
    chip.textContent=t("tierNames")[k]+" · "+fmt.format(P.tiers[k].setup)+" "+t("setupWord")+" · "+fmt.format(tierMonthly(k))+t("perMo");
    const desc=document.createElement("span"); desc.className="desc";
    desc.textContent=t("tierDesc")[k];
    line.appendChild(chip); line.appendChild(desc);
    legend.appendChild(line);
  });
  const root=$("catalogue"); root.innerHTML="";
  CATEGORIES.forEach((cat,ci)=>{
    const sec=document.createElement("div"); sec.className="cat";
    const head=document.createElement("button");
    head.type="button"; head.className="cat-head";
    head.setAttribute("aria-expanded", state.openCats.has(ci));
    head.innerHTML='<span>'+cat[state.lang]+'</span>'+
      '<span class="ch-right"><span class="cat-count" id="cat-count-'+ci+'" hidden></span>'+
      '<span class="chev" aria-hidden="true">▾</span></span>';
    sec.appendChild(head);
    const body=document.createElement("div"); body.className="cat-body";
    body.id="cat-body-"+ci;
    body.hidden=!state.openCats.has(ci);
    head.setAttribute("aria-controls", body.id);
    head.addEventListener("click",()=>{
      if(state.openCats.has(ci)) state.openCats.delete(ci); else state.openCats.add(ci);
      const open=state.openCats.has(ci);
      head.setAttribute("aria-expanded", open);
      body.hidden=!open;
    });
    const grid=document.createElement("div"); grid.className="apps";
    const items=APPS.filter(a=>a.cat===ci);
    const done=new Set();
    items.forEach(a=>{
      if(done.has(a.id)) return;
      if(a.alt){
        const wrap=document.createElement("div"); wrap.className="altgroup";
        const lbl=document.createElement("span"); lbl.className="altgroup-label";
        lbl.textContent=t("altPick"); wrap.appendChild(lbl);
        items.filter(s=>s.alt===a.alt).forEach(s=>{ wrap.appendChild(makeCard(s)); done.add(s.id); });
        grid.appendChild(wrap);
      }else{
        grid.appendChild(makeCard(a)); done.add(a.id);
      }
    });
    body.appendChild(grid); sec.appendChild(body); root.appendChild(sec);
  });
}

/* ====================== ROI CHART ====================== */
function drawROI(){
  const M=P.bulk.chartMonths;
  const cloudM=cloudMonthly(), nasOnce=nasOneTime(), care=P.bulk.nas.careMonthly;
  const cloudEnd=cloudM*M, nasEnd=nasOnce+care*M;
  const maxY=Math.max(cloudEnd, nasEnd, 1);
  const W=560,H=140,padL=8,padR=12,padT=16,padB=22;
  const X=m=>padL+(W-padL-padR)*m/M;
  const Y=v=>padT+(H-padT-padB)*(1-v/maxY);
  let cloudPts="",nasPts="";
  for(let m=0;m<=M;m++){
    cloudPts+=X(m)+","+Y(cloudM*m)+" ";
    nasPts+=X(m)+","+Y(nasOnce+care*m)+" ";
  }
  const be=breakevenMonths();
  let beLine="";
  if(be<=M){
    beLine='<line x1="'+X(be)+'" y1="'+padT+'" x2="'+X(be)+'" y2="'+(H-padB)+'" stroke="#9A5B2F" stroke-width="1.5" stroke-dasharray="4 3"/>'+
      '<text x="'+X(be)+'" y="'+(padT-4)+'" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#9A5B2F">'+be+' '+t("chMonths")+'</text>';
  }
  let ticks="";
  [12,24,36].forEach(m=>{ if(m<=M) ticks+='<text x="'+X(m)+'" y="'+(H-6)+'" text-anchor="middle" font-family="IBM Plex Mono" font-size="9" fill="#51625F">'+m+'</text>'; });
  const svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" role="img">'+
    '<line x1="'+padL+'" y1="'+(H-padB)+'" x2="'+(W-padR)+'" y2="'+(H-padB)+'" stroke="#DCE5E2"/>'+
    ticks+
    '<polyline points="'+cloudPts.trim()+'" fill="none" stroke="#51625F" stroke-width="2"/>'+
    '<polyline points="'+nasPts.trim()+'" fill="none" stroke="#14655A" stroke-width="2"/>'+
    beLine+
    '</svg>';
  $("roi-svg").innerHTML=svg;
  $("roi-legend").innerHTML=
    '<span><span class="dot" style="background:#51625F"></span>'+t("chCloud")+' : '+fmt.format(cloudEnd)+' '+t("chOver")+'</span>'+
    '<span><span class="dot" style="background:#14655A"></span>'+t("chNas")+' : '+fmt.format(nasEnd)+' '+t("chOver")+'</span>';
  $("roi-break").textContent = be<=M ? tmpl(t("chBreak"),{n:be}) : t("chNever");
}

/* ====================== CALC ====================== */
function orderedApps(){
  const rows=[]; const rendered=new Set();
  const roots=[...state.explicit].map(appById)
    .sort((a,b)=>tierMonthly(b.tier)-tierMonthly(a.tier) || a.name.localeCompare(b.name));
  roots.forEach(root=>{
    if(!rendered.has(root.id)){ rows.push({app:root,indent:false}); rendered.add(root.id); }
    [...state.implied.entries()].forEach(([iid,reasonSet])=>{
      if(reasonSet.has(root.id) && !rendered.has(iid)){
        const reasons=[...reasonSet].map(r=>appById(r).name).join(", ");
        rows.push({app:appById(iid),indent:true,reasons}); rendered.add(iid);
      }
    });
  });
  return rows;
}

function calc(){
  const once=[], monthly=[], annual=[];
  const appRows=orderedApps();
  const hasSharedApps=[...state.explicit,...state.implied.keys()].some(id=>!appById(id).alwaysHosted);
  const showHostedInfra = selectedCount()===0 || hasSharedApps;  // site-only clients ride their own isolated VPS

  // --- one-time ---
  once.push({n:t("rAudit"), s:t("rAuditSub"), v:P.audit});
  let projectOnce=0;

  if(isOnPrem()){
    once.push({n:t("rFoundation"), s:t("rFoundationSub"), v:P.foundation});
    once.push({n:t("rHardware"), s:tmpl(t("rHardwareSub"),{lo:fmt.format(P.hardware.low),hi:fmt.format(P.hardware.high)}), v:P.hardware.estimate});
    once.push({n:t("rUps"), s:tmpl(t("rUpsSub"),{lo:fmt.format(P.hardware.ups.low),hi:fmt.format(P.hardware.ups.high)}), v:P.hardware.ups.estimate});
    projectOnce+=P.foundation+P.hardware.estimate+P.hardware.ups.estimate;
  }else if(showHostedInfra){
    once.push({n:t("rHostedSetup"), s:t("rHostedSetupSub"), v:P.hosted.setup});
    projectOnce+=P.hosted.setup;
  }

  appRows.forEach(r=>{
    const v=P.tiers[r.app.tier].setup;
    once.push({n:tmpl(t("rSetup"),{n:r.app.name}), s:r.indent?tmpl(t("rDep"),{x:r.reasons}):t("tierWord")[r.app.tier], v, indent:r.indent});
    projectOnce+=v;
    if(state.training.has(r.app.id) && r.app.train){
      once.push({n:t("rTrain"), s:r.app.train[state.lang], v:r.app.train.price, indent:true});
      projectOnce+=r.app.train.price;
    }
  });

  if(state.bulkTB>0 && state.bulkMode==="nas"){
    once.push({n:t("rNasSetup"), s:t("rNasSetupSub"), v:P.bulk.nas.setup});
    once.push({n:t("rNasHw")+" — "+state.bulkTB+" "+tbUnit(), s:t("rNasHwSub"), v:P.bulk.nas.hwBase+P.bulk.nas.hwPerTB*state.bulkTB});
    projectOnce+=P.bulk.nas.setup+P.bulk.nas.hwBase+P.bulk.nas.hwPerTB*state.bulkTB;
  }

  if(state.email){
    once.push({n:t("rEmail"), s:t("rEmailSub"), v:P.emailSetup});
    projectOnce+=P.emailSetup;
  }

  if(state.video){
    once.push({n:t("rVideo"), s:t("rVideoSub"), v:P.video.setup});
    projectOnce+=P.video.setup;
  }

  if(projectOnce>0) once.push({n:t("rCredit"), s:t("rCreditSub"), v:-P.audit, credit:true});

  if(state.supportBlock>0){
    const b=P.supportBlocks[state.supportBlock-1];
    once.push({n:tmpl(t("rBlock"),{h:b.hours}), s:t("rBlockSub"), v:b.price});
  }

  // --- monthly ---
  if(isOnPrem()){
    monthly.push({n:t("rCare"), s:t("rCareSub"), v:P.serverCare});
  }else if(showHostedInfra){
    const si=hostedSize();
    monthly.push({n:tmpl(t("rHostedBase"),{s:t("sizeNames")[si]}), s:tmpl(t("rHostedBaseSub"),{g:P.hostedIncludedGB}), v:P.hosted.sizes[si].monthly});
  }
  const bkTB=Math.max(state.bulkTB, P.backup.minTB);
  monthly.push({n:tmpl(t("rBackup"),{n:bkTB+" "+tbUnit()}), s:isOnPrem()?t("rBackupSubOnPrem"):t("rBackupSubHosted"), v:P.backup.baseMonthly+P.backup.perTBMonthly*bkTB});
  if(state.endpoints>0){
    monthly.push({n:tmpl(t("rWs"),{n:state.endpoints}), s:t("rWsSub"), v:P.workstation.perEndpointMonthly*state.endpoints});
  }
  appRows.forEach(r=>{
    monthly.push({n:r.app.name, s:r.indent?tmpl(t("rDep"),{x:r.reasons}):t("tierWord")[r.app.tier]+" · "+t("appMonthlySub"), v:appMonthly(r.app), indent:r.indent});
  });
  if(state.bulkTB>0){
    if(state.bulkMode==="cloud"){
      monthly.push({n:tmpl(t("rCloud"),{n:state.bulkTB}), s:t("rCloudSub"), v:cloudMonthly()});
    }else{
      monthly.push({n:t("rNasCare"), s:t("rNasCareSub"), v:P.bulk.nas.careMonthly});
    }
  }
  if(state.video){
    monthly.push({n:t("rVideoCare"), s:t("rVideoCareSub"), v:P.video.careMonthly});
  }

  // --- annual ---
  if(state.domain){
    annual.push({n:t("rDomain"), s:t("rDomainSub"), v:P.domain.estimate});
  }

  return {once, monthly, annual,
    onceTotal: once.reduce((s,r)=>s+r.v,0),
    monthlyTotal: monthly.reduce((s,r)=>s+r.v,0),
    annualTotal: annual.reduce((s,r)=>s+r.v,0)};
}

/* ====================== RENDER ====================== */
function moneyRow(v){ return v<0 ? "−"+fmt.format(-v) : fmt.format(v); }

function renderRows(el, rows, emptyMsg){
  el.innerHTML="";
  if(!rows.length){ if(emptyMsg) el.innerHTML='<div class="lrow empty">'+emptyMsg+'</div>'; return; }
  rows.forEach(r=>{
    const d=document.createElement("div");
    d.className="lrow"+(r.indent?" indent":"")+(r.credit?" credit":"");
    const name=(r.indent?"↳ ":"")+r.n;
    d.innerHTML='<span class="li-name">'+name+(r.s?'<span class="sub">'+r.s+'</span>':'')+'</span><span class="li-amt">'+moneyRow(r.v)+'</span>';
    el.appendChild(d);
  });
}

function flash(el){ el.classList.remove("tick"); void el.offsetWidth; el.classList.add("tick"); }

function render(){
  $("seg-hosted").setAttribute("aria-pressed", state.deploy==="hosted");
  $("seg-owned").setAttribute("aria-pressed", state.deploy==="owned");

  $("ws-count").textContent=state.endpoints;

  // bulk storage
  $("bulk-out").textContent = state.bulkTB===0 ? "0" : state.bulkTB+" "+tbUnit();
  $("bulk-body").hidden = state.bulkTB===0;
  if(state.bulkTB>0){
    $("bulk-cloud").setAttribute("aria-pressed", state.bulkMode==="cloud");
    $("bulk-nas").setAttribute("aria-pressed", state.bulkMode==="nas");
    drawROI();
    const be=breakevenMonths();
    const note=$("roi-note"), txt=$("roi-text"), btn=$("roi-btn");
    if(state.bulkMode==="cloud" && be<=P.bulk.roiWarnMonths){
      note.hidden=false; note.className="roi-note warn";
      txt.textContent=tmpl(t("roiWarnTxt"),{n:be}); btn.hidden=false;
    }else if(state.bulkMode==="nas" && be>P.bulk.chartMonths){
      note.hidden=false; note.className="roi-note calm";
      txt.textContent=t("roiCalmTxt"); btn.hidden=true;
    }else{
      note.hidden=true;
    }
  }

  APPS.forEach(a=>{
    const el=$("app-"+a.id);
    if(el){
      el.setAttribute("aria-pressed", isSelected(a.id));
      const tr=el.querySelector(".train input");
      if(tr) tr.checked = state.training.has(a.id);
    }
  });

  CATEGORIES.forEach((cat,ci)=>{
    const badge=$("cat-count-"+ci);
    if(badge){
      const n=APPS.filter(a=>a.cat===ci && isSelected(a.id)).length;
      badge.hidden = n===0;
      badge.textContent = "✓ "+n;
    }
  });

  const c=calc();
  renderRows($("rows-once"), c.once, t("emptyOnce"));
  renderRows($("rows-monthly"), c.monthly, t("emptyMonthly"));
  renderRows($("rows-annual"), c.annual, "");
  $("annual-group").hidden = c.annual.length===0;
  $("rows-hourly").innerHTML=
    '<div class="lrow"><span class="li-name">'+t("hrBusiness")+'</span><span class="li-amt">'+fmt.format(P.hourly.business)+'/h</span></div>'+
    '<div class="lrow"><span class="li-name">'+t("hrAfter")+'</span><span class="li-amt">'+fmt.format(P.hourly.afterHours)+'/h</span></div>'+
    '<div class="lrow"><span class="li-name">'+t("hrStaff")+'</span><span class="li-amt">'+fmt.format(P.hourly.staffChange)+' '+t("flatWord")+'</span></div>';
  $("total-once").textContent=fmt.format(c.onceTotal);
  $("total-monthly").textContent=fmt.format(c.monthlyTotal)+t("perMo");
  $("total-year").textContent=fmt.format(c.onceTotal+12*c.monthlyTotal+c.annualTotal);
  $("total-next").textContent=fmt.format(12*c.monthlyTotal+c.annualTotal)+t("perYr");
  flash($("total-once")); flash($("total-monthly")); flash($("total-year"));

  let pool=0;
  if(isOnPrem()) pool+=P.onPremPoolHours;
  if(state.endpoints>0) pool+=P.workstation.poolHours;
  $("pool-line").hidden = pool===0;
  if(pool>0) $("pool-line").textContent=tmpl(t("poolLine"),{n:pool});

  $("mb-month").textContent=fmt.format(c.monthlyTotal)+t("perMo");
  $("mb-year").textContent=fmt.format(c.onceTotal+12*c.monthlyTotal+c.annualTotal);
}

/* ====================== EVENTS ====================== */
function setDeploy(d){ state.deploy=d; buildCatalogue(); render(); }
$("seg-hosted").addEventListener("click",()=>setDeploy("hosted"));
$("seg-owned").addEventListener("click",()=>setDeploy("owned"));
$("dom-check").addEventListener("change",e=>{ state.domain=e.target.checked; render(); });
$("em-check").addEventListener("change",e=>{ state.email=e.target.checked; render(); });
$("vid-check").addEventListener("change",e=>{ state.video=e.target.checked; render(); });
$("bulk-slider").addEventListener("input",e=>{ state.bulkTB=Number(e.target.value); render(); });
$("bulk-cloud").addEventListener("click",()=>{ state.bulkMode="cloud"; render(); });
$("bulk-nas").addEventListener("click",()=>{ state.bulkMode="nas"; render(); });
$("roi-btn").addEventListener("click",()=>{ state.bulkMode="nas"; render(); });
$("btn-reco").addEventListener("click",()=>{
  CONFIG.recommended.forEach(id=>{ if(!isSelected(id)) selectApp(id); });
  toast(t("toastReco"));
  render();
});
$("btn-clear").addEventListener("click",()=>{
  state.explicit.clear(); state.implied.clear(); state.training.clear();
  render();
});
$("ws-minus").addEventListener("click",()=>{ state.endpoints=Math.max(0,state.endpoints-1); render(); });
$("ws-plus").addEventListener("click",()=>{ state.endpoints=Math.min(60,state.endpoints+1); render(); });
$("block-select").addEventListener("change",e=>{ state.supportBlock=Number(e.target.value); render(); });
$("btn-print").addEventListener("click",()=>window.print());
$("mb-view").addEventListener("click",()=>$("ledger").scrollIntoView({behavior:"smooth"}));
$("lang-fr").addEventListener("click",()=>{ state.lang="fr"; applyLang(); render(); });
$("lang-en").addEventListener("click",()=>{ state.lang="en"; applyLang(); render(); });

/* ====================== INIT ====================== */
applyLang();
render();
</script>
